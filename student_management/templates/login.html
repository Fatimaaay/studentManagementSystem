{% extends 'base.html' %}

{% block title %}Login - Student Management{% endblock %}

{% block content %}
<style>
    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    body {
        background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-container {
        max-width: 440px;
        width: 90%;
        margin: 60px auto;
        padding: 40px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: fadeIn 0.6s ease-out;
        position: relative;
        overflow: hidden;
    }

    .login-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 300% 300%;
        animation: gradient 3s ease infinite;
    }

    .login-container h2 {
        color: #2d3748;
        margin-bottom: 10px;
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: float 3s ease-in-out infinite;
    }

    .login-subtitle {
        text-align: center;
        color: #718096;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 24px;
        position: relative;
    }

    .form-group label {
        display: block;
        color: #4a5568;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
        transition: color 0.3s ease;
    }

    .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        box-sizing: border-box;
        transition: all 0.3s ease;
        background: #f7fafc;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
    }

    .form-group input:focus + label {
        color: #667eea;
    }

    button[type="submit"] {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        position: relative;
        overflow: hidden;
    }

    button[type="submit"]::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
    }

    button[type="submit"]:hover::before {
        left: 100%;
    }

    button[type="submit"]:active {
        transform: translateY(0);
    }

    .signup-link {
        text-align: center;
        margin-top: 25px;
        color: #718096;
        font-size: 14px;
    }

    .signup-link a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
    }

    .signup-link a::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 0;
        height: 2px;
        background: #667eea;
        transition: width 0.3s ease;
    }

    .signup-link a:hover::after {
        width: 100%;
    }

    .signup-link a:hover {
        color: #764ba2;
    }

    /* Welcome icon */
    .welcome-icon {
        text-align: center;
        margin-bottom: 20px;
        animation: pulse 2s ease-in-out infinite;
    }

    .welcome-icon svg {
        width: 60px;
        height: 60px;
        fill: url(#gradient);
    }

    /* Icon decorations */
    .icon-decoration {
        position: absolute;
        opacity: 0.1;
        pointer-events: none;
    }

    .icon-decoration.top-left {
        top: -30px;
        left: -30px;
        width: 100px;
        height: 100px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        border-radius: 50%;
        animation: float 4s ease-in-out infinite;
    }

    .icon-decoration.bottom-right {
        bottom: -40px;
        right: -40px;
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #f093fb, #4facfe);
        border-radius: 50%;
        animation: float 5s ease-in-out infinite reverse;
    }

    /* Responsive design */
    @media (max-width: 480px) {
        .login-container {
            padding: 30px 25px;
        }

        .login-container h2 {
            font-size: 26px;
        }
    }
</style>

<div class="login-container">
    <div class="icon-decoration top-left"></div>
    <div class="icon-decoration bottom-right"></div>

    <div class="welcome-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
    </div>

    <h2>Welcome Back</h2>
    <p class="login-subtitle">Login to continue managing students</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Login</button>

        <p class="signup-link">
            Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
        </p>
    </form>
</div>
{% endblock %}
