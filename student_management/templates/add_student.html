{% extends 'base.html' %}

{% block title %}Add Student - Student Management{% endblock %}

{% block content %}
<style>
    @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    body {
        background: linear-gradient(-45deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .add-student-container {
        max-width: 600px;
        width: 100%;
        margin: 40px auto;
        padding: 40px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: fadeInUp 0.6s ease-out;
        position: relative;
        overflow: hidden;
    }

    .add-student-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 300% 300%;
        animation: gradient 3s ease infinite;
    }

    h2 {
        color: #2d3748;
        margin-bottom: 10px;
        text-align: center;
        font-size: 32px;
        font-weight: 700;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: float 3s ease-in-out infinite;
    }

    .subtitle {
        text-align: center;
        color: #718096;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .icon-header {
        text-align: center;
        font-size: 48px;
        margin-bottom: 15px;
        animation: float 3s ease-in-out infinite;
    }

    .form-group {
        margin-bottom: 24px;
        position: relative;
        animation: slideIn 0.5s ease-out backwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .form-group:nth-child(4) { animation-delay: 0.4s; }

    .form-group label {
        display: block;
        color: #4a5568;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 14px;
        transition: color 0.3s ease;
    }

    .form-group input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 15px;
        box-sizing: border-box;
        transition: all 0.3s ease;
        background: #f7fafc;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        background: white;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        transform: translateY(-2px);
    }

    .form-group input:focus ~ label {
        color: #667eea;
    }

    .button-group {
        display: flex;
        gap: 12px;
        margin-top: 30px;
        animation: fadeInUp 0.6s ease-out 0.5s backwards;
    }

    button[type="submit"] {
        flex: 1;
        padding: 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        position: relative;
        overflow: hidden;
    }

    button[type="submit"]::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
    }

    button[type="submit"]:hover::before {
        left: 100%;
    }

    button[type="submit"]:active {
        transform: translateY(0);
    }

    .btn {
        flex: 1;
        padding: 16px;
        background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(113, 128, 150, 0.4);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(113, 128, 150, 0.6);
    }

    .btn:hover::before {
        left: 100%;
    }

    /* Decorative elements */
    .decoration-circle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.08;
        pointer-events: none;
    }

    .decoration-circle.top-left {
        top: -60px;
        left: -60px;
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #667eea, #764ba2);
        animation: float 5s ease-in-out infinite;
    }

    .decoration-circle.bottom-right {
        bottom: -70px;
        right: -70px;
        width: 180px;
        height: 180px;
        background: linear-gradient(135deg, #f093fb, #4facfe);
        animation: float 6s ease-in-out infinite reverse;
    }

    .decoration-circle.middle {
        top: 50%;
        right: -50px;
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #4facfe, #667eea);
        animation: float 7s ease-in-out infinite;
    }

    /* Responsive design */
    @media (max-width: 480px) {
        .add-student-container {
            padding: 30px 25px;
        }

        h2 {
            font-size: 26px;
        }

        .button-group {
            flex-direction: column;
        }
    }
</style>

<div class="add-student-container">
    <div class="decoration-circle top-left"></div>
    <div class="decoration-circle bottom-right"></div>
    <div class="decoration-circle middle"></div>

    <div class="icon-header">📝</div>
    <h2>Add New Student</h2>
    <p class="subtitle">Fill in the details to register a new student</p>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>

        <div class="form-group">
            <label for="course">Course:</label>
            <input type="text" id="course" name="course" placeholder="e.g., Computer Science" required>
        </div>

        <div class="button-group">
            <button type="submit">Add Student</button>
            <a href="{% url 'dashboard' %}" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
